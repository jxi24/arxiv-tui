name: Sanitizers

on:
  push:
  pull_request:

jobs:
  asan-ubsan:
    name: ASan + UBSan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libsqlite3-dev libcurl4-openssl-dev ccache

      - name: Cache CPM packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/CPM
          key: cpm-${{ hashFiles('Dependencies.txt') }}
          restore-keys: cpm-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-asan-${{ runner.os }}-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            ccache-asan-${{ runner.os }}-${{ github.ref }}-
            ccache-asan-${{ runner.os }}-

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DARXIV_TUI_ENABLE_TESTING=ON \
            -DENABLE_SANITIZER_ADDRESS=ON \
            -DENABLE_SANITIZER_UNDEFINED_BEHAVIOR=ON \
            -DCPM_SOURCE_CACHE=~/.cache/CPM
        env:
          CCACHE_MAXSIZE: 500M

      - name: Build
        run: cmake --build build -j8
        env:
          CCACHE_MAXSIZE: 500M

      - name: ccache stats
        run: ccache --show-stats

      - name: Test
        run: ctest --test-dir build --output-on-failure -j8
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1

  tsan:
    name: TSan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libsqlite3-dev libcurl4-openssl-dev ccache

      - name: Cache CPM packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/CPM
          key: cpm-${{ hashFiles('Dependencies.txt') }}
          restore-keys: cpm-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-tsan-${{ runner.os }}-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            ccache-tsan-${{ runner.os }}-${{ github.ref }}-
            ccache-tsan-${{ runner.os }}-

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DARXIV_TUI_ENABLE_TESTING=ON \
            -DENABLE_SANITIZER_THREAD=ON \
            -DCPM_SOURCE_CACHE=~/.cache/CPM
        env:
          CCACHE_MAXSIZE: 500M

      - name: Build
        run: cmake --build build -j8
        env:
          CCACHE_MAXSIZE: 500M

      - name: ccache stats
        run: ccache --show-stats

      - name: Test
        run: ctest --test-dir build --output-on-failure -j8
        env:
          TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1
