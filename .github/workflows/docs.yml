name: Documentation

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so we can list all tags

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-docs-${{ hashFiles('docs/requirements.txt') }}
          restore-keys: pip-docs-

      - name: Install Sphinx dependencies
        run: pip install -r docs/requirements.txt

      # Determine the version name for this build.
      # On a tag push it is the tag (e.g. v0.9.1); on main it is "latest".
      - name: Determine version name
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "name=latest" >> "$GITHUB_OUTPUT"
          fi

      # Collect every vX.Y.Z tag whose git tree contains a docs/ directory,
      # plus "main".  Tags created before the docs site was added are excluded
      # so the root redirect never points to a folder that was never deployed.
      - name: Collect all version names
        id: all_versions
        run: |
          TAGS=""
          for tag in $(git tag --list 'v*' --sort=version:refname); do
            if git ls-tree "$tag" --name-only 2>/dev/null | grep -q '^docs$'; then
              TAGS="${TAGS}${tag},"
            fi
          done
          echo "tags=${TAGS}latest" >> "$GITHUB_OUTPUT"

      # Build the Sphinx site for this version, injecting the version list
      # and the current version into html_context so the sidebar switcher works.
      - name: Build Sphinx docs
        env:
          VERSION_NAME: ${{ steps.version.outputs.name }}
          ALL_VERSIONS: ${{ steps.all_versions.outputs.tags }}
        run: |
          # Build a JSON array for SPHINX_VERSIONS consumed by conf.py.
          # Format expected by _templates/versioning.html:
          #   [{"name": "v0.9.1", "url": "../v0.9.1/index.html"}, ...]
          # Note: sphinx-build -D only supports scalar strings, so versions are
          # passed via env vars and parsed as JSON in conf.py instead.
          python3 - <<'PYEOF'
          import os, json

          current = os.environ["VERSION_NAME"]
          raw = os.environ["ALL_VERSIONS"].rstrip(",")
          names = [n for n in raw.split(",") if n]

          # Move "latest" to the end so tags sort before it.
          if "latest" in names:
              names.remove("latest")
              names.append("latest")

          versions_json = json.dumps([
              {"name": n, "url": f"../{n}/index.html"} for n in names
          ])
          with open("docs/_versions_context.json", "w") as f:
              json.dump({"versions": versions_json, "current": current}, f)
          PYEOF

          VERSIONS_JSON=$(python3 -c "
          import json
          d = json.load(open('docs/_versions_context.json'))
          print(d['versions'])
          ")
          CURRENT=$(python3 -c "
          import json
          d = json.load(open('docs/_versions_context.json'))
          print(d['current'])
          ")

          SPHINX_VERSIONS="${VERSIONS_JSON}" \
          SPHINX_CURRENT_VERSION="${CURRENT}" \
          sphinx-build \
            -D "version=${VERSION_NAME}" \
            -D "release=${VERSION_NAME}" \
            docs \
            "_build/html/${VERSION_NAME}"

      # Write a root index.html that redirects to "latest" (the main branch build).
      - name: Write root redirect
        run: |
          mkdir -p _build/html
          cat > _build/html/index.html <<EOF
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=latest/index.html">
              <title>arxiv-tui docs</title>
            </head>
            <body>
              <p>Redirecting to <a href="latest/index.html">latest</a>…</p>
            </body>
          </html>
          EOF

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: _build/html

      # Deploy to gh-pages, keeping previously deployed version directories.
      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _build/html
          keep_files: true   # preserve previously deployed version directories
          full_commit_message: "docs: deploy ${{ steps.version.outputs.name }} (${{ github.sha }})"
