name: Coverage

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libsqlite3-dev libcurl4-openssl-dev gcovr ccache

      - name: Cache CPM packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/CPM
          key: cpm-${{ hashFiles('Dependencies.txt') }}
          restore-keys: cpm-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-coverage-${{ runner.os }}-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            ccache-coverage-${{ runner.os }}-${{ github.ref }}-
            ccache-coverage-${{ runner.os }}-

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DARXIV_TUI_ENABLE_TESTING=ON \
            -DARXIV_TUI_COVERAGE=ON \
            -DCPM_SOURCE_CACHE=~/.cache/CPM
        env:
          CCACHE_MAXSIZE: 500M

      - name: Build
        run: cmake --build build -j$(nproc)
        env:
          CCACHE_MAXSIZE: 500M

      - name: ccache stats
        run: ccache --show-stats

      - name: Test
        run: ctest --test-dir build --output-on-failure -j$(nproc)

      - name: Generate coverage report (text + threshold check)
        run: cmake --build build --target coverage

      - name: Generate Cobertura XML
        run: cmake --build build --target coverage-xml

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: build/coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: build/coverage.xml
