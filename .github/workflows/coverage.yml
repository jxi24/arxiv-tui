name: Coverage

on:
  push:
  pull_request:

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libsqlite3-dev libcurl4-openssl-dev gcovr

      - name: Cache CPM packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/CPM
          key: cpm-${{ hashFiles('Dependencies.txt') }}
          restore-keys: cpm-

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DARXIV_TUI_ENABLE_TESTING=ON \
            -DARXIV_TUI_COVERAGE=ON \
            -DCPM_SOURCE_CACHE=~/.cache/CPM

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure -j$(nproc)

      - name: Generate coverage report (text + threshold check)
        run: cmake --build build --target coverage

      - name: Generate Cobertura XML
        run: cmake --build build --target coverage-xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: build/coverage.xml
