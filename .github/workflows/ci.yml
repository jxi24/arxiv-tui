name: Build & Test

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libsqlite3-dev libcurl4-openssl-dev

      - name: Cache CPM packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/CPM
          key: cpm-${{ hashFiles('Dependencies.txt') }}
          restore-keys: cpm-

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DARXIV_TUI_ENABLE_TESTING=ON \
            -DCPM_SOURCE_CACHE=~/.cache/CPM

      - name: Build
        run: cmake --build build -j8

      - name: Test
        run: ctest --test-dir build --output-on-failure -j8
